<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="../icons/favicon.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="../icons/favicon-white.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="../icons/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)">
  <title>Resume</title>
</head>
<body>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

    body {
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      transition: background 0.4s;
      opacity: 0;
      animation: fadeIn 1.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .terminal {
      width: 100%;
      max-width: 820px;
      min-height: 560px;
      background: #1e1e1e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid #333;
      position: relative;
    }

    .terminal-header {
      background: #2d2d2d;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .traffic-lights { display: flex; gap: 8px; }
    .light { 
      width: 12px; 
      height: 12px; 
      border-radius: 50%; 
      position: relative;
      cursor: pointer;
    }
    .red { background: #ff5f57; }
    .yellow { background: #ffbd2e; }
    .green { background: #27c93f; }

    .light.red:hover::after {
      content: "×";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(41, 41, 41, 0.733);
      font-size: 20px;
      font-weight: bold;
      line-height: 1;
    }

    .terminal-title {
      margin-left: 12px;
      color: #888;
      font-size: 0.9rem;
      flex: 1;
    }

    .toggle-btn {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      width: 32px;
      height: 32px;
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      transition: transform 0.3s;
      z-index: 10;
    }

    .toggle-btn:hover {
      transform: translateY(-50%) rotate(20deg);
    }

    .terminal-body {
      padding: 30px 40px;
      line-height: 1.7;
      color: #1ddc00;
      font-size: 1.05rem;
    }

    h1 { color: #ffffff; margin: 0 0 20px 0; font-size: 2.2rem; }
    .section h2 { color: #c5c8c6; margin: 0 0 12px 0; font-size: 1.3rem; }

    body.light {
      background: #f0f0f0;
    }

    body.light .terminal {
      background: #f8f8f8;
      border-color: #ccc;
      min-height: 560px;
      margin: 40px auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 820px;
      box-sizing: border-box;
    }

    body.light .terminal-header {
      background: #e5e5e5;
    }

    body.light .terminal-body {
      color: #1ddc00;
    }

    body.light h1 {
      color: #1a1a1a;
    }

    body.light .section h2 {
      color: #444;
    }

    /* Neutralize flex collapsing */
    body.light, body.light * {
      float: none;
      flex: none;
      width: auto;
      max-width: none;
    }

    body.light .terminal-header .traffic-lights,
    body.light .traffic-lights {
      display: flex;
      gap: 8px;
    }

    body.light .light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

  </style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <div class="traffic-lights">
        <div class="light red" onclick="window.location.href='../'"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
      </div>
      <div class="terminal-title">~/resume</div>
      
      <button class="toggle-btn" id="theme-toggle">
        <img src="../icons/sun.png" alt="Light mode" width="24" height="24">
      </button>
    </div>

    <div class="terminal-body">
      <h1>Brian Crink</h1>
      <p>Software Engineer</p>

      <div class="section">
        <h2>Experience</h2>
        <p><strong>Software Engineer</strong> Company Name</p>
      </div>

      <div class="section">
        <h2>Projects</h2>
        <p>Projects</p>
      </div>

      <div class="section">
        <h2>Contact</h2>
        <p>Contact</p>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const body = document.body;

    toggleBtn.addEventListener('click', () => {
      body.classList.toggle('light');
      
      if (body.classList.contains('light')) {
        toggleBtn.innerHTML = `<img src="../icons/moon.png" alt="Dark mode" width="24" height="24">`;
      } else {
        toggleBtn.innerHTML = `<img src="../icons/sun.png" alt="Light mode" width="24" height="24">`;
      }
    });
  </script>
</body>
</html>
