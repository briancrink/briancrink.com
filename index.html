<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="icons/favicon.png" type="image/png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="icons/favicon-white.png" type="image/png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-dark.png" media="(prefers-color-scheme: dark)">
  <title>Brian Crink</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      background: #000000;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
      transition: background 0.4s;
      opacity: 0;                    /* Start hidden */
      animation: fadeIn 1.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .container {
      max-width: 620px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 3.2rem;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .tagline {
      font-size: 1.25rem;
      color: #888;
      margin-bottom: 80px;
    }

    .sections {
      display: flex;
      flex-direction: column;
      gap: 48px;
      margin-bottom: 80px;
    }

    .section h2 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      font-weight: 600;
      color: #ffffff;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 520px;
      margin: 0 auto;
    }

    .link {
      display: block;
      width: 200px;
      margin: 0 auto;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      text-decoration: none;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(20px);
      transition: all 0.25s ease;
      text-align: center;
    }

    .link:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Light Mode */
    body.light {
      background: #ffffff;
      color: #1a1a1a;
    }

    body.light h1, body.light h2 {
      color: #1a1a1a;
    }

    body.light .link {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.12);
      color: #1a1a1a;
      box-shadow: none;
    }

    body.light .link:hover {
      background: white;
    }

    .toggle-btn {
      background: transparent;
      border: none;
      width: 48px;
      height: 48px;
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: transform 0.3s;
      margin: 60px auto 0;
      display: block;
    }

    .toggle-btn:hover {
      transform: rotate(20deg);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Brian Crink</h1>

    <div class="sections">
      <div class="section">
        <h2>Explore</h2>
        <div class="links">
          <a href="/feed" class="link">Newsfeed</a>
          <a href="/dotfiles" class="link">Dotfiles</a>
        </div>
      </div>

      <div class="section">
        <h2>Connect</h2>
        <div class="links">
          <a href="https://x.com/briancrink" class="link" target="_blank">X</a>
          <a href="https://threads.net/@briancrink" class="link" target="_blank">Threads</a>
          <a href="https://instagram.com/briancrink" class="link" target="_blank">Instagram</a>
        </div>
      </div>
    </div>

    <button class="toggle-btn" id="theme-toggle">
      <img src="icons/sun.png" alt="Light mode" width="28" height="28">
    </button>
  </div>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');
    const body = document.body;

    toggleBtn.addEventListener('click', () => {
      body.classList.toggle('light');
      
      if (body.classList.contains('light')) {
        toggleBtn.innerHTML = `<img src="icons/moon.png" alt="Dark mode" width="28" height="28">`;
      } else {
        toggleBtn.innerHTML = `<img src="icons/sun.png" alt="Light mode" width="28" height="28">`;
      }
    });
  </script>
</body>
</html>
